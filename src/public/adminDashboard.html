<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="adminDashboard.html">AdminPanel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Welcome, <span id="adminName" class="fw-bold">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="adminDropdown">
                            <li><a class="dropdown-item active" href="adminDashboard.html">My Profile</a></li>
                            <li><a class="dropdown-item" href="employees.html">Employees</a></li>
                            <li><a class="dropdown-item" href="departments.html">Departments</a></li>
                            <li><a class="dropdown-item" href="allrequestadmin.html">All Requests</a></li>
                            <li><a class="dropdown-item" href="accounts.html">User Accounts</a></li>
                            <li><a class="dropdown-item" href="accounts.html">Accounts</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="fw-bold mb-0">My Profile</h2>
                    <a href="home.html" class="btn btn-sm btn-outline-secondary">Back to Home</a>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 text-center">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px; font-size: 2rem;">
                            <span id="profileInitial">A</span>
                        </div>
                        
                        <h4 class="card-title fw-bold" id="profileName">Loading...</h4>
                        <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2 mb-4" id="profileRole">
                            ADMIN
                        </span>

                        <div class="text-start border-top pt-3">
                            <div class="row mb-2">
                                <div class="col-4 text-muted small fw-bold text-uppercase">Username</div>
                                <div class="col-8 fw-semibold" id="detailUsername">---</div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-4 text-muted small fw-bold text-uppercase">Access Level</div>
                                <div class="col-8" id="detailRole text-capitalize">---</div>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button class="btn btn-primary" id="editProfileBtn">
                                Edit Profile Details
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Check Auth and Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                fetchProfile();
            }
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || user.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'login.html';
                return false;
            }
            
            document.getElementById('adminName').textContent = user.username;
            return true;
        }

        async function fetchProfile() {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch('http://localhost:4000/api/profile', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Update header and card
                    document.getElementById('profileName').textContent = data.username;
                    document.getElementById('profileRole').textContent = data.role.toUpperCase();
                    document.getElementById('profileInitial').textContent = data.username.charAt(0).toUpperCase();
                    
                    // Update details list
                    document.getElementById('detailUsername').textContent = data.username;
                    document.getElementById('detailRole text-capitalize').textContent = data.role;
                } else {
                    console.error('Profile fetch failed');
                }
            } catch (error) {
                console.error('Error fetching profile:', error);
            }
        }


        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
