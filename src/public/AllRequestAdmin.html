<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Requests - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="adminDashboard.html">AdminPanel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Welcome, <span id="adminName" class="fw-bold">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="adminDropdown">
                            <li><a class="dropdown-item" href="adminDashboard.html">Dashboard</a></li>
                            <li><a class="dropdown-item" href="employees.html">Employees</a></li>
                            <li><a class="dropdown-item" href="departments.html">Departments</a></li>
                            <li><a class="dropdown-item active" href="allrequestadmin.html">All Requests</a></li>
                            <li><a class="dropdown-item" href="accounts.html">Accounts</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">All User Requests</h5>
                        <div>
                            <button class="btn btn-light btn-sm me-2" onclick="filterRequests('all')">All</button>
                            <button class="btn btn-warning btn-sm me-2" onclick="filterRequests('pending')">Pending</button>
                            <button class="btn btn-success btn-sm me-2" onclick="filterRequests('approved')">Approved</button>
                            <button class="btn btn-danger btn-sm" onclick="filterRequests('rejected')">Rejected</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>User</th>
                                        <th>Type</th>
                                        <th>Purpose</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="requestsTable">
                                    <tr><td colspan="7" class="text-center">Loading requests...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Update Modal -->
    <div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Update Request Status</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="statusRequestId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Request Details:</label>
                        <div id="requestDetails" class="p-3 bg-light rounded"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Update Status:</label>
                        <select class="form-select" id="newStatus" required>
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="rejected">Rejected</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="updateRequestStatus()">Update Status</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allRequests = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                fetchAllRequests();
            }
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || user.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'login.html';
                return false;
            }
            document.getElementById('adminName').textContent = user.username;
            return true;
        }

        async function fetchAllRequests() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('http://localhost:4000/api/admin/requests', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    allRequests = data;
                    displayRequests(allRequests);
                } else {
                    document.getElementById('requestsTable').innerHTML = 
                        '<tr><td colspan="7" class="text-center text-danger">Failed to load requests</td></tr>';
                }
            } catch (error) {
                console.error('Fetch requests error:', error);
                document.getElementById('requestsTable').innerHTML = 
                    '<tr><td colspan="7" class="text-center text-danger">Error loading requests</td></tr>';
            }
        }

        function displayRequests(requests) {
            const tbody = document.getElementById('requestsTable');
            if (!requests || requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No requests found</td></tr>';
                return;
            }

            tbody.innerHTML = requests.map(req => {
                const statusBadge = getStatusBadge(req.status);
                const date = new Date(req.created_at).toLocaleDateString();
                
                return `
                    <tr>
                        <td>${req.id}</td>
                        <td><strong>User #${req.userId}</strong></td>
                        <td><span class="badge bg-info">${req.requestType}</span></td>
                        <td>${req.purpose}</td>
                        <td>${statusBadge}</td>
                        <td>${date}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="openStatusModal(${JSON.stringify(req).replace(/"/g, '&quot;')})">
                                Update Status
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="badge bg-warning text-dark">Pending</span>',
                'approved': '<span class="badge bg-success">Approved</span>',
                'rejected': '<span class="badge bg-danger">Rejected</span>',
                'cancelled': '<span class="badge bg-secondary">Cancelled</span>'
            };
            return badges[status] || '<span class="badge bg-secondary">Unknown</span>';
        }

        function filterRequests(status) {
            currentFilter = status;
            
            // Update button states
            document.querySelectorAll('.card-header button').forEach(btn => {
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-light');
            });
            event.target.classList.remove('btn-light');
            event.target.classList.add('btn-primary');

            if (status === 'all') {
                displayRequests(allRequests);
            } else {
                const filtered = allRequests.filter(req => req.status === status);
                displayRequests(filtered);
            }
        }

        function openStatusModal(request) {
            document.getElementById('statusRequestId').value = request.id;
            document.getElementById('newStatus').value = request.status;
            
            document.getElementById('requestDetails').innerHTML = `
                <strong>ID:</strong> ${request.id}<br>
                <strong>User:</strong> User #${request.userId}<br>
                <strong>Type:</strong> ${request.requestType}<br>
                <strong>Purpose:</strong> ${request.purpose}<br>
                <strong>Current Status:</strong> ${request.status}
            `;
            
            const modal = new bootstrap.Modal(document.getElementById('statusModal'));
            modal.show();
        }

        async function updateRequestStatus() {
            const requestId = document.getElementById('statusRequestId').value;
            const newStatus = document.getElementById('newStatus').value;
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`http://localhost:4000/api/admin/requests/${requestId}/status`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ status: newStatus })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Request status updated successfully!');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('statusModal'));
                    if (modal) {
                        modal.hide();
                    }
                    fetchAllRequests(); // Refresh the list
                } else {
                    alert(data.message || 'Failed to update status');
                }
            } catch (error) {
                console.error('Update status error:', error);
                alert('Error updating status');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
