<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary bg-opacity-10 d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="mb-3">
                    <a href="home.html" class="text-decoration-none text-muted small">
                        &larr; Back to Home
                    </a>
                </div>

                <div class="card shadow border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Welcome Back</h2>
                            <p class="text-muted">Please enter your details</p>
                        </div>
                        
                        <form onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Username</label>
                                <input type="text" id="username" class="form-control" placeholder="Enter username" required />
                            </div>

                            <div class="mb-4">
                                <div class="d-flex justify-content-between">
                                    <label for="password" class="form-label fw-semibold">Password</label>
                                    <a href="#" class="small text-decoration-none">Forgot?</a>
                                </div>
                                <input type="password" id="password" class="form-control" placeholder="••••••••" required />
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">Sign In</button>
                            </div>
                        </form>

                        <div class="text-center">
                            <span class="small text-muted">Don't have an account?</span>
                            <a href="register.html" class="small text-decoration-none fw-bold">Sign Up</a>
                        </div>
                    </div>
                 
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:4000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Show welcome message
                    alert(data.message);
                    
                    // Redirect based on user role from API response
                    if (data.isAdmin) {
                        console.log('Redirecting admin to dashboard');
                        window.location.href = data.redirectUrl;
                    } else {
                        console.log('Redirecting user to profile');
                        window.location.href = 'userDashboard.html';
                    }
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }
        }


    
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
