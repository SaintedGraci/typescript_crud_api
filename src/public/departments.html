<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="adminDashboard.html">AdminPanel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Welcome, <span id="adminName" class="fw-bold">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="adminDropdown">
                            <li><a class="dropdown-item" href="adminDashboard.html">My Profile</a></li>
                            <li><a class="dropdown-item" href="employees.html">Employees</a></li>
                            <li><a class="dropdown-item active" href="departments.html">Departments</a></li>
                            <li><a class="dropdown-item" href="AllRequestAdmin.html">All Requests</a></li>
                            <li><a class="dropdown-item" href="accounts.html">Accounts</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Add New Department</h5>
                    </div>
                    <div class="card-body">
                        <form id="registerDepartmentForm" onsubmit="registerDepartment(event)">
                            <div class="mb-3">
                                <label class="form-label">Department Name</label>
                                <input type="text" id="departmentName" class="form-control" placeholder="e.g. IT" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea id="departmentDescription" class="form-control" rows="3" placeholder="Department goals..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Register Department</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Existing Departments</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="departmentsTable">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editDepartmentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editDepartmentForm" onsubmit="updateDepartment(event)">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Department</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="editDepartmentId">
                        <div class="mb-3">
                            <label class="form-label">Department Name</label>
                            <input type="text" id="editDepartmentName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="editDepartmentDescription" class="form-control" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Use the JS code from your prompt here
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                fetchDepartments();
            }
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || user.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'login.html';
                return false;
            }
            document.getElementById('adminName').textContent = user.username;
            return true;
        }

        async function fetchDepartments() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('http://localhost:4000/api/departments', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayDepartments(data.departments || []);
                } else {
                    document.getElementById('departmentsTable').innerHTML = 
                        '<tr><td colspan="4" class="text-center text-danger">Failed to load departments</td></tr>';
                }
            } catch (error) {
                console.error('Fetch departments error:', error);
                document.getElementById('departmentsTable').innerHTML = 
                    '<tr><td colspan="4" class="text-center text-danger">Error loading departments</td></tr>';
            }
        }

        function displayDepartments(departments) {
            const tbody = document.getElementById('departmentsTable');
            if (!departments || departments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No departments found</td></tr>';
                return;
            }
            tbody.innerHTML = departments.map(dept => `
                <tr>
                    <td>${dept.id}</td>
                    <td><strong>${dept.name}</strong></td>
                    <td>${dept.description}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editDepartment(${dept.id})">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteDepartment(${dept.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function registerDepartment(event) {
            event.preventDefault();
            const name = document.getElementById('departmentName').value.trim();
            const description = document.getElementById('departmentDescription').value.trim();
            
            if (!name) {
                alert('Department name is required');
                return;
            }
            
            const token = localStorage.getItem('token');

            try {
                const response = await fetch('http://localhost:4000/api/register/department', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ name, description })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Department registered successfully!');
                    document.getElementById('registerDepartmentForm').reset();
                    fetchDepartments();
                } else {
                    alert(data.message || 'Failed to register department');
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Error registering department');
            }
        }

        async function editDepartment(id) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`http://localhost:4000/api/departments/${id}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('editDepartmentId').value = data.department.id;
                    document.getElementById('editDepartmentName').value = data.department.name;
                    document.getElementById('editDepartmentDescription').value = data.department.description || '';
                    
                    const modal = new bootstrap.Modal(document.getElementById('editDepartmentModal'));
                    modal.show();
                } else {
                    alert(data.message || 'Failed to load department data');
                }
            } catch (error) {
                console.error('Edit department error:', error);
                alert('Error loading department data');
            }
        }

        async function updateDepartment(event) {
            event.preventDefault();
            const id = document.getElementById('editDepartmentId').value;
            const name = document.getElementById('editDepartmentName').value.trim();
            const description = document.getElementById('editDepartmentDescription').value.trim();
            
            if (!name) {
                alert('Department name is required');
                return;
            }
            
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`http://localhost:4000/api/departments/update/${id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ name, description })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Department updated successfully!');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('editDepartmentModal'));
                    if (modal) {
                        modal.hide();
                    }
                    fetchDepartments();
                } else {
                    alert(data.message || 'Failed to update department');
                }
            } catch (error) {
                console.error('Update error:', error);
                alert('Error updating department');
            }
        }

        async function deleteDepartment(id) {
            if (!confirm('Are you sure you want to delete this department?')) {
                return;
            }
            
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`http://localhost:4000/api/departments/delete/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Department deleted successfully!');
                    fetchDepartments();
                } else {
                    alert(data.message || 'Failed to delete department');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Error deleting department');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
