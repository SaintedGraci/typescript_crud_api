<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="userDashboard.html">User Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Welcome, <span id="navUsername" class="fw-bold">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="userDashboard.html">My Profile</a></li>
                            <li><a class="dropdown-item active" href="request.html">My Requests</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Create New Request</h5>
                        <form id="registerRequestForm" onsubmit="createrequest(event)">
                            <input type="hidden" id="requestUserId">
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Request Type</label>
                                <select class="form-select" id="requestType" required>
                                    <option value="">Choose type...</option>
                                    <option value="Hardware">Hardware</option>
                                    <option value="Software">Software</option>
                                    <option value="Supplies">Supplies</option>
                                    <option value="Maintenance">Maintenance</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Purpose / Items</label>
                                <textarea class="form-control" id="requestPurpose" rows="3" placeholder="Describe what you need..." required></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Submit Request</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">My Past Requests</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Type</th>
                                        <th>Purpose</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="requestsTable">
                                    <tr><td colspan="4" class="text-center">Loading requests...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editRequestModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editRequestForm" onsubmit="updateRequest(event)">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Edit Request</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="editRequestId">
                        <input type="hidden" id="editRequestUserId">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Request Type</label>
                            <select class="form-select" id="editRequestType" required>
                                <option value="Hardware">Hardware</option>
                                <option value="Software">Software</option>
                                <option value="Supplies">Supplies</option>
                                <option value="Maintenance">Maintenance</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Purpose</label>
                            <textarea class="form-control" id="editRequestPurpose" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                const user = JSON.parse(localStorage.getItem('user'));
                document.getElementById('requestUserId').value = user.id; // Auto-fill User ID
                fetchRequests();
            }
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || user.role !== 'user') {
                window.location.href = 'login.html';
                return false;
            }
            document.getElementById('navUsername').textContent = user.username;
            return true;
        }

        async function fetchRequests() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('http://localhost:4000/api/requests', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok) {
                    displayRequests(data); // Changed from data.requests to data depending on API
                }
            } catch (error) {
                document.getElementById('requestsTable').innerHTML = '<tr><td colspan="4" class="text-danger">Error connecting to server</td></tr>';
            }
        }

        function displayRequests(requests) {
            const tbody = document.getElementById('requestsTable');
            if (!requests || requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No requests found</td></tr>';
                return;
            }
            tbody.innerHTML = requests.map(req => {
                const status = req.status.toLowerCase();
                const statusBadge = status === 'pending' ? 'bg-warning text-dark' : 
                                   status === 'approved' ? 'bg-success' : 'bg-danger';
                const statusText = req.status.charAt(0).toUpperCase() + req.status.slice(1);
                return `
                <tr>
                    <td><span class="badge bg-info text-dark">${req.requestType}</span></td>
                    <td>${req.purpose}</td>
                    <td><span class="badge ${statusBadge}">${statusText}</span></td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick='openEditModal(${JSON.stringify(req)})'>Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteRequest(${req.id})">Delete</button>
                    </td>
                </tr>
            `}).join('');
        }

        function openEditModal(req) {
            document.getElementById('editRequestId').value = req.id;
            document.getElementById('editRequestUserId').value = req.user_id || req.userId;
            document.getElementById('editRequestType').value = req.requestType;
            document.getElementById('editRequestPurpose').value = req.purpose;
            new bootstrap.Modal(document.getElementById('editRequestModal')).show();
        }

        async function createrequest(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');
            const userId = document.getElementById('requestUserId').value;
            
            if (!userId) {
                alert('User ID not found. Please log out and log in again.');
                return;
            }
            
            const body = {
                userId: parseInt(userId),
                requestType: document.getElementById('requestType').value,
                purpose: document.getElementById('requestPurpose').value
            };
            try {
                const response = await fetch('http://localhost:4000/api/requests/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert(data.message || 'Request created successfully!');
                    document.getElementById('registerRequestForm').reset();
                    fetchRequests();
                } else {
                    alert(data.message || 'Error creating request');
                }
            } catch (error) { 
                console.error('Error:', error);
                alert('Error creating request. Please try again.');
            }
        }

        async function updateRequest(event) {
            event.preventDefault();
            const id = document.getElementById('editRequestId').value;
            const token = localStorage.getItem('token');
            const body = {
                userId: document.getElementById('editRequestUserId').value,
                requestType: document.getElementById('editRequestType').value,
                purpose: document.getElementById('editRequestPurpose').value
            };
            try {
                const response = await fetch(`http://localhost:4000/api/requests/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(body)
                });
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('editRequestModal')).hide();
                    fetchRequests();
                }
            } catch (error) { alert('Error updating'); }
        }

        async function deleteRequest(id) {
            if (!confirm('Delete this request?')) return;
            const token = localStorage.getItem('token');
            try {
                await fetch(`http://localhost:4000/api/requests/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                fetchRequests();
            } catch (error) { alert('Error deleting'); }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
