<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="adminDashboard.html">AdminPanel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Welcome, <span id="adminName" class="fw-bold">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="adminDropdown">
                            <li><a class="dropdown-item" href="adminDashboard.html">My Profile</a></li>
                            <li><a class="dropdown-item active" href="employees.html">Employees</a></li>
                            <li><a class="dropdown-item" href="departments.html">Departments</a></li>
                            <li><a class="dropdown-item" href="AllRequestAdmin.html">All Requests</a></li>
                            <li><a class="dropdown-item" href="accounts.html">Accounts</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Employees</h2>
        
        <!-- Register Employee Form -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Register New Employee</h5>
            </div>
            <div class="card-body">
                <form id="registerEmployeeForm" onsubmit="registerEmployee(event)">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label for="employeeName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="employeeName" placeholder="Enter full name" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label for="employeePosition" class="form-label">Position</label>
                                <input type="text" class="form-control" id="employeePosition" placeholder="Enter position" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label for="employeeDepartment" class="form-label">Department</label>
                                <select class="form-select" id="employeeDepartment" required>
                                    <option value="">Select Department</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">&nbsp;</label>
                                <div>
                                    <button type="submit" class="btn btn-primary">Register Employee</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Employee List -->
        <div class="card">
            <div class="card-header">
                <h5>Employee List</h5>
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Position</th>
                            <th>Department</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTable">
                        <tr>
                            <td colspan="5" class="text-center">Loading employees...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Employee Modal -->
    <div class="modal fade" id="editEmployeeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editEmployeeForm" onsubmit="updateEmployee(event)">
                        <input type="hidden" id="editEmployeeId">
                        <div class="mb-3">
                            <label for="editEmployeeName" class="form-label">Name</label>
                            <input type="text" class="form-control" id="editEmployeeName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editEmployeePosition" class="form-label">Position</label>
                            <input type="text" class="form-control" id="editEmployeePosition" required>
                        </div>
                        <div class="mb-3">
                            <label for="editEmployeeDepartment" class="form-label">Department</label>
                            <input type="text" class="form-control" id="editEmployeeDepartment" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="editEmployeeForm" class="btn btn-primary">Update Employee</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load departments on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadDepartments();
                loadEmployees();
            }
        });

        // Load departments for dropdown
        async function loadDepartments() {
            try {
                const response = await fetch('http://localhost:4000/api/departments/list');
                const departments = await response.json();
                
                const select = document.getElementById('employeeDepartment');
                select.innerHTML = '<option value="">Select Department</option>';
                
                departments.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept.id;
                    option.textContent = dept.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading departments:', error);
            }
        }

        // Register new employee
        async function registerEmployee(event) {
            event.preventDefault();
            
            const name = document.getElementById('employeeName').value;
            const position = document.getElementById('employeePosition').value;
            const departmentId = parseInt(document.getElementById('employeeDepartment').value);
            
            if (!name || !position || !departmentId) {
                alert('Please fill in all fields');
                return;
            }
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('http://localhost:4000/api/employees/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, position, departmentId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Employee registered successfully!');
                    // Clear form
                    document.getElementById('registerEmployeeForm').reset();
                    // Reload employees list
                    loadEmployees();
                } else {
                    alert(data.message || 'Failed to register employee');
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Error registering employee. Please try again.');
            }
        }

        // Edit employee
        async function editEmployee(id) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`http://localhost:4000/api/employees/${id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Populate edit form
                    document.getElementById('editEmployeeId').value = data.employee.id;
                    document.getElementById('editEmployeeName').value = data.employee.name;
                    document.getElementById('editEmployeePosition').value = data.employee.position;
                    document.getElementById('editEmployeeDepartment').value = data.employee.department;
                    
                    // Show modal
                    new bootstrap.Modal(document.getElementById('editEmployeeModal')).show();
                } else {
                    alert(data.message || 'Failed to load employee data');
                }
            } catch (error) {
                console.error('Edit employee error:', error);
                alert('Error loading employee data. Please try again.');
            }
        }

        // Update employee
        async function updateEmployee(event) {
            event.preventDefault();
            
            const id = document.getElementById('editEmployeeId').value;
            const name = document.getElementById('editEmployeeName').value;
            const position = document.getElementById('editEmployeePosition').value;
            const department = document.getElementById('editEmployeeDepartment').value;
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`http://localhost:4000/api/employees/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, position, department })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Employee updated successfully!');
                    // Hide modal
                    bootstrap.Modal.getInstance(document.getElementById('editEmployeeModal')).hide();
                    // Reload employees list
                    loadEmployees();
                } else {
                    alert(data.message || 'Failed to update employee');
                }
            } catch (error) {
                console.error('Update error:', error);
                alert('Error updating employee. Please try again.');
            }
        }

        // Delete employee
        async function deleteEmployee(id) {
            if (!confirm('Are you sure you want to delete this employee?')) {
                return;
            }
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`http://localhost:4000/api/employees/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Employee deleted successfully!');
                    loadEmployees();
                } else {
                    alert(data.message || 'Failed to delete employee');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Error deleting employee. Please try again.');
            }
        }

        // Check if user is admin
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || user.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'login.html';
                return false;
            }
            
            document.getElementById('adminName').textContent = user.username;
            return true;
        }

        // Load employees
        async function loadEmployees() {
            if (!checkAuth()) return;
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('http://localhost:4000/api/employees', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayEmployees(data.employees);
                } else {
                    document.getElementById('employeesTable').innerHTML = 
                        '<tr><td colspan="5" class="text-center text-danger">Failed to load employees</td></tr>';
                }
            } catch (error) {
                console.error('Error loading employees:', error);
                document.getElementById('employeesTable').innerHTML = 
                    '<tr><td colspan="5" class="text-center text-danger">Error loading employees</td></tr>';
            }
        }

        // Display employees in table
        function displayEmployees(employees) {
            const tbody = document.getElementById('employeesTable');
            
            if (employees.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No employees found</td></tr>';
                return;
            }
            
            tbody.innerHTML = employees.map(employee => `
                <tr>
                    <td>${employee.id}</td>
                    <td>${employee.name}</td>
                    <td>${employee.position}</td>
                    <td>${employee.department ? employee.department.name : 'N/A'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary me-1" onclick="editEmployee(${employee.id})">
                            Edit
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${employee.id})">
                            Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Load employees when page loads
        document.addEventListener('DOMContentLoaded', loadEmployees);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
